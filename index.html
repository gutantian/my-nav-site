<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>京东导航 - 开源书签管理程序</title>
  <script src="websites.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --sidebar-bg: #161b27;
      --card-bg: #1e2433;
      --card-hover: #252d42;
      --accent: #4f8ef7;
      --accent2: #7c5cbf;
      --text: #e2e8f0;
      --text-muted: #8b95a9;
      --border: #2a3246;
      --radius: 12px;
      --sidebar-w: 220px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    #sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0; left: 0; bottom: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 24px 20px 16px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo span.dot {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: inline-block;
    }

    .sidebar-nav { padding: 12px 10px; flex: 1; }

    .nav-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      padding: 10px 10px 6px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: background .15s, color .15s;
      cursor: pointer;
    }
    .nav-link:hover, .nav-link.active {
      background: rgba(79,142,247,.12);
      color: var(--accent);
    }
    .nav-link .icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-footer {
      padding: 14px 20px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 32px 36px;
      max-width: 1200px;
    }

    .search-wrap {
      margin-bottom: 36px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border .2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
      pointer-events: none;
    }
    .search-hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .section { margin-bottom: 40px; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .section-icon { font-size: 20px; }
    .section-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }
    .section-count {
      font-size: 12px;
      background: rgba(79,142,247,.15);
      color: var(--accent);
      border-radius: 20px;
      padding: 2px 8px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: background .15s, border-color .15s, transform .15s;
    }
    .card:hover {
      background: var(--card-hover);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-favicon {
      width: 38px; height: 38px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .card-favicon img {
      width: 100%; height: 100%;
      object-fit: contain;
      border-radius: 9px;
    }

    .card-info { min-width: 0; }
    .card-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .section.hidden, .card.hidden { display: none; }

    #no-result {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 0;
      font-size: 15px;
      display: none;
    }

    @media (max-width: 768px) {
      #sidebar { transform: translateX(-100%); transition: transform .25s; }
      #sidebar.open { transform: translateX(0); }
      #main { margin-left: 0; padding: 20px 16px; }
      .menu-btn { display: flex; }
    }

    .menu-btn {
      display: none;
      position: fixed;
      bottom: 20px; right: 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      width: 48px; height: 48px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      z-index: 200;
      box-shadow: 0 4px 14px rgba(79,142,247,.5);
    }
  </style>
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-logo">
    <span class="dot"></span>
    京东导航
  </div>
  <nav class="sidebar-nav" id="sidebar-nav">
    <div class="nav-section-title">分类</div>
  </nav>
  <div class="sidebar-footer">✨ 持续更新中</div>
</aside>

<main id="main">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search" type="text" placeholder="搜索网站名称或描述..." oninput="doSearch(this.value)" />
    <div class="search-hint">按 <kbd>/</kbd> 聚焦搜索框</div>
  </div>

  <div id="no-result">没有找到匹配的网站 🤔</div>
  <div id="sections-container"></div>
</main>

<button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

<script>
  const categoryIcons = {
    '常用': '🔥',
    'Alist_openlist': '📂',
    '常用网址': '🌐'
  };

  const categoryKeys = Object.keys(websites);

  function getCategoryIcon(name) {
    return categoryIcons[name] || '📁';
  }

  function buildSidebar() {
    const nav = document.getElementById('sidebar-nav');
    categoryKeys.forEach((key, i) => {
      const a = document.createElement('a');
      a.className = 'nav-link' + (i === 0 ? ' active' : '');
      a.innerHTML = `<span class="icon">${getCategoryIcon(key)}</span> ${key}`;
      a.onclick = function (e) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        a.classList.add('active');
        const el = document.getElementById('sec-' + key);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        document.getElementById('sidebar').classList.remove('open');
      };
      nav.appendChild(a);
    });
  }

  function buildSections() {
    const container = document.getElementById('sections-container');
    categoryKeys.forEach(key => {
      const sites = websites[key];
      const section = document.createElement('div');
      section.className = 'section';
      section.id = 'sec-' + key;

      const header = document.createElement('div');
      header.className = 'section-header';
      header.innerHTML = `
        <span class="section-icon">${getCategoryIcon(key)}</span>
        <span class="section-title">${key}</span>
        <span class="section-count">${sites.length}</span>
      `;
      section.appendChild(header);

      const cards = document.createElement('div');
      cards.className = 'cards';

      sites.forEach(site => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = site.url;
        card.target = '_blank';
        card.rel = 'noopener';

        let domain = '';
        try { domain = new URL(site.url).hostname; } catch (e) {}

        card.innerHTML = `
          <div class="card-favicon">
            <img src="https://www.google.com/s2/favicons?domain=${domain}&sz=64" onerror="this.style.display='none';this.parentNode.textContent='🌐'">
          </div>
          <div class="card-info">
            <div class="card-name">${site.name}</div>
            <div class="card-desc">${site.desc}</div>
          </div>
        `;
        cards.appendChild(card);
      });

      section.appendChild(cards);
      container.appendChild(section);
    });
  }

  function doSearch(q) {
    q = q.trim().toLowerCase();
    const sections = document.querySelectorAll('.section');
    let anyVisible = false;

    sections.forEach(sec => {
      const cards = sec.querySelectorAll('.card');
      let secVisible = false;
      cards.forEach(card => {
        const text = card.textContent.toLowerCase();
        const match = !q || text.includes(q);
        card.classList.toggle('hidden', !match);
        if (match) secVisible = true;
      });
      sec.classList.toggle('hidden', !secVisible);
      if (secVisible) anyVisible = true;
    });

    document.getElementById('no-result').style.display = anyVisible ? 'none' : 'block';
  }

  document.addEventListener('DOMContentLoaded', () => {
    buildSidebar();
    buildSections();
  });

  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('search').focus();
    }
    if (e.key === 'Escape') {
      document.getElementById('search').value = '';
      doSearch('');
      document.getElementById('search').blur();
    }
  });
</script>
</body>
</html>
